<!doctype html>
<html lang="en" data-bs-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Profile</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

<header>
    <nav class="navbar navbar-expand-lg bg-white border-bottom px-4">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="#">
                <img src="Appointments-Profile Admin\Profile Pics\PulseImage.jpeg" class="rounded-circle" style="height: 100px;">
                <span>Profile page</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <i class="bi bi-bell"></i>
                <i class="bi bi-gear"></i>
                <img src="Appointments-Profile Admin\Profile Pics\Screenshot 2026-04-22 005014.png" class="rounded-circle" style="height: 50px;">
                
            </div>

        </div>
    </nav>
</header>

<main class="container-fluid">
    <div class="row">

        
        <aside class="col-md-2 bg-white border-end vh-100 p-3">

            <ul class="nav flex-column gap-2">
                <li class="nav-item">
                    <a class="nav-link active bg-primary-subtle rounded" href="#">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" href="Appointments.html">Bookings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" href="Healthquest.html">Healthquests</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" href="Sicknote.html">Sick Notes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" href="History.html">History</a>
                </li>
            </ul>

            <div class="position-absolute bottom-0 mb-4">
                <a href="#" class="text-muted text-decoration-none">Logout</a>
            </div>

        </aside>

        
        <section class="col-md-10 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div class="d-flex align-items-center gap-3">
                    <img src="Appointments-Profile Admin/Profile Pics/Screenshot 2026-04-22 005014.png" class="rounded-circle" style="height: 100px;">

                    <div>
                        <h5 class="mb-1" th:text="${doctor.name}">Dr Inga Plati</h5>
                        <small class="text-success">
                            ● Active
                        </small>

                    </div>
                </div>

                <div>
                    <button class="btn btn-light me-2">Discard</button>
                    <button class="btn btn-primary">Save Changes</button>
                </div>

            </div>

       
            <div class="row g-4">

                <div class="col-lg-8">
                    <div class="card p-3 shadow-sm">

                        <h6 class="mb-3 text-muted">PERSONAL DETAILS</h6>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" >
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Staff Number</label>
                                <input type="text" class="form-control" >
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" class="form-control" >
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" th:value="${doctor.email}">
                        </div>

                        <div>
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" th:value="${doctor.address}">
                        </div>

                    </div>
                </div>

                <!-- Qualifications -->
                <div class="col-lg-4">
                    <div class="card p-3 shadow-sm">

                        <h6 class="mb-3 text-muted">HEALTH QUALIFICATIONS</h6>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Qualification</span>
                            <strong th:text="${doctor.qualification}">PhD</strong>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">School</span>
                            <strong th:text="${doctor.university}">UCT</strong>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Workplace</span>
                            <strong th:text="${doctor.workplace}">Clinic</strong>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Position</span>
                            <strong th:text="${doctor.position}">Doctor</strong>
                        </div>

                        <div class="d-flex justify-content-between">
                            <span class="text-muted">Experience</span>
                            <strong th:text="${doctor.experience}">4 years</strong>
                        </div>

                    </div>
                </div>

            </div>

        </section>

    </div>
</main>

<footer class="text-center py-3 text-muted">
    © 2026 PulseUp
</footer>

</body>
</html>
