<!DOCTYPE html>
<html lang="en" data-bs-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Consultation History</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<header>
    <nav class="navbar navbar-expand-lg bg-white border-bottom px-4">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="#">
                <img src="Logo.jpeg" class="rounded-circle" style="height: 100px;">
                <span>History page</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <input class="form-control rounded-pill" type="search" placeholder="Search history..." style="width: 250px;">
                <i class="bi bi-bell"></i>
                <i class="bi bi-gear"></i>
                <img src="#" class="rounded-circle" style="height: 50px;">

            </div>

        </div>
    </nav>
</header>

<main class="container-fluid">
    <div class="row">

        <aside class="col-md-2 bg-white border-end vh-100 p-3">

            <ul class="nav flex-column gap-2">
                <li class="nav-item">
                    <a class="nav-link text-dark" href="AdminProfile.html">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" href="Appointments.html">Bookings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" href="Healthquest.html">Healthquests</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" href="Sicknote.html">Sick Notes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white rounded" href="#">History</a>
                </li>
            </ul>

            <div class="position-absolute bottom-0 mb-4">
                <a href="#" class="text-muted text-decoration-none">Logout</a>
            </div>

        </aside>

        <section class="col-md-10 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h4 class="mb-0">Consultation History</h4>

                <div class="d-flex gap-2">

                    <select class="form-select form-select-sm" style="width: 150px;">
                        <option selected>Status</option>
                        <option>Attended</option>
                        <option>Cancelled</option>
                        <option>No-show</option>
                    </select>

                    <input type="date" class="form-control form-control-sm">

                </div>

            </div>

            <div class="card shadow-sm p-3">

                <div class="table-responsive">
                    <table class="table align-middle">

                        <thead class="table-light">
                        <tr>
                            <th>Consultation</th>
                            <th>Doctor / Clinic</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="item : ${history}">

                            <td>
                                <strong th:text="${item.type}">General Consultation</strong><br>
                                <small class="text-muted" th:text="${item.category}">Health Clearance</small>
                            </td>

                            <td th:text="${item.doctor}">Dr. van der Merwe</td>

                            <td th:text="${item.date}">Feb 24, 2026</td>

                            <td>
                                <span class="badge bg-success" th:if="${item.status == 'Attended'}">Attended</span>
                                <span class="badge bg-danger" th:if="${item.status == 'Cancelled'}">Cancelled</span>
                                <span class="badge bg-secondary" th:if="${item.status == 'No-show'}">No-show</span>
                            </td>

                            <td>
                                <a href="#" class="text-decoration-none">View</a>
                            </td>

                        </tr>

                        </tbody>

                    </table>
                </div>

            </div>

        </section>

    </div>
</main>

<footer class="text-center py-3 text-muted small">
    © 2026 PulseUp Clinical System
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
